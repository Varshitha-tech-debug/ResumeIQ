services:
  - type: web
    name: resumeiq-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: CORS_ORIGINS
        value: https://resumeiq.vercel.app
      - key: OPENAI_API_KEY
        sync: false   # Set manually in Render dashboard (not committed to repo)
      - key: PYTHON_VERSION
        value: 3.12.0
